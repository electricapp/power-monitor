name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deny-all by default; each job re-grants only the scopes it needs (all of
# these read-only, so `contents: read`).
permissions: {}

env:
  CARGO_TERM_COLOR: always
  # Mirror release-crate.sh: any warning fails the gate.
  RUSTFLAGS: "-D warnings"

# Every `uses:` is pinned to a full commit SHA for supply-chain safety; the
# trailing comment is the semver tag that SHA corresponds to (dependabot keeps
# both in sync). dtolnay/rust-toolchain only ships the `v1` action tag — the
# Rust channel it installs is selected via the `toolchain:` input, never the ref.
jobs:
  # Formatting only needs to parse the source — no IOKit/IOReport linking —
  # so it runs on cheap (and for public repos, free) Linux runners.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # clippy, tests, and docs all link the macOS frameworks (IOKit,
  # CoreFoundation, IOReport) and gate on `cfg(target_os = "macos")`, so they
  # must run on an Apple Silicon macOS runner (macos-latest is arm64).
  build:
    name: clippy + test + doc
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo clippy --all-targets
        run: cargo clippy --all-targets -- -D warnings

      # --release matches release-crate.sh: the zero-alloc tests in
      # tests/no_alloc.rs depend on the optimizer and are only meaningful in
      # release mode. Hardware-dependent assertions skip gracefully when
      # IOReport is unavailable on the runner VM.
      - name: cargo test --release
        run: cargo test --release

      - name: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings -D rustdoc::broken-intra-doc-links -D rustdoc::private-intra-doc-links -D rustdoc::invalid-codeblock-attributes"
        run: cargo doc --no-deps

  # Verify the crate still builds on the declared MSRV (Cargo.toml
  # rust-version). Catches accidental use of newer-than-supported APIs.
  msrv:
    name: msrv (1.96)
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo build (MSRV)
        run: cargo build --all-targets

  # ── Supply-chain: license/bans/sources policy (deny.toml) ──
  # Runs on cheap Linux runners — the policy is platform-independent. The
  # scheduled supply-chain.yml re-runs this against the committed lockfile.
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: cargo-deny check
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          # deny.toml lives at the repo root; the action auto-detects it.
          command: check

  # ── Supply-chain: RustSec advisory audit ──
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: rustsec/audit-check
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Spelling: docs + identifiers ──
  typos:
    name: typos
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: crate-ci/typos
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  # ── Unused dependencies: flags dead deps in Cargo.toml ──
  unused-deps:
    name: cargo-machete
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install cargo-machete
        uses: taiki-e/install-action@682e7d9e49c5e653d371fc6adbda67653461378a # v2.82.4
        with:
          tool: cargo-machete
      - name: cargo machete
        run: cargo machete

  # ── Lint the workflow files themselves (YAML + embedded shell) ──
  # shellcheck ships on the runner, so actionlint also checks the inline
  # bash. Catches dead runner labels, quoting bugs, and bad expressions.
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run actionlint (SHA-pinned download + checksum)
        run: |
          VER="1.7.12"
          SHA="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz" -o actionlint.tgz
          echo "${SHA}  actionlint.tgz" | sha256sum -c -
          tar -xzf actionlint.tgz actionlint
          ./actionlint
